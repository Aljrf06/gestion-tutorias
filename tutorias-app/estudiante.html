<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Estudiante - UIS</title>
    <link rel="stylesheet" href="tutor.css"> </head>
<body>

<div class="dashboard">
    <main class="main-content">
        <header class="header">
            <div class="header-title">
                <span class="icon-book">🎓</span>
                <div>
                    <h1>Portal de Estudiante</h1>
                    <p>Bienvenido, <span id="nombreBienvenida">Cargando...</span></p>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </header>

<section class="actions-section">
    <div class="section-title">
        <h2>Buscar tutorías disponibles</h2>
    </div>
    
    <div class="filter-bar" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd;">
        
        <div style="flex-grow: 1; min-width: 150px;">
            <label for="filtroMateria" style="display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9em;">Materia:</label>
            <input type="text" id="filtroMateria" placeholder="Ej: Cálculo" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        </div>

        <div style="flex-grow: 1; min-width: 150px;">
            <label for="filtroTutor" style="display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9em;">Tutor:</label>
            <input type="text" id="filtroTutor" placeholder="Ej: Juan" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        </div>

        <div style="flex-grow: 1; min-width: 150px;">
            <label for="filtroFecha" style="display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9em;">Fecha:</label>
            <input type="date" id="filtroFecha" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        </div>

        <button class="btn-primary" onclick="cargarTodasLasTutorias()" style="height: 42px; padding: 0 25px;">Buscar</button>
        
        <button style="height: 42px; padding: 0 15px; background: #eee; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; color: #555;" onclick="limpiarFiltros()">Limpiar</button>
    </div>
</section>

        <div id="listaFranjasDisponibles" class="slots-grid">
            </div>

        <section class="reservations-section" style="margin-top: 40px;">
            <div class="section-title">
                <h2>Mis solicitudes de tutoría</h2>
            </div>
            <div class="table-container" style="background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid #eee;">
                            <th>Materia</th>
                            <th>Tutor</th>
                            <th>Fecha/Hora</th>
                            <th>Estado</th>
                            <th>Acciones</th> </tr>
                        </tr>
                    </thead>
                    <tbody id="misReservas">
                        </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="estudiante.js"></script>
</body>
</html>
